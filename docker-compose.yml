services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://qatth:qatth@postgres:5432/qatth
      UPLOAD_DIR: /app/data/uploads
      GENERATED_DIR: /app/data/generated
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8501"]'
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: qatth
      POSTGRES_USER: qatth
      POSTGRES_PASSWORD: qatth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init_pgvector.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qatth -d qatth"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_data:
  postgres_data:

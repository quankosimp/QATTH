services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://qatth:qatth@postgres:5432/qatth
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://qatth:qatth@postgres:5432/qatth
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_BACKEND: minio
      R2_ENDPOINT_URL: http://minio:9000
      R2_ACCESS_KEY_ID: qatthminio
      R2_SECRET_ACCESS_KEY: qatthminiosecret
      R2_BUCKET: qatth-assets
      UPLOAD_DIR: /app/data/uploads
      GENERATED_DIR: /app/data/generated
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8501"]'
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    init: true
    stop_grace_period: 40s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://qatth:qatth@postgres:5432/qatth
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_BACKEND: minio
      R2_ENDPOINT_URL: http://minio:9000
      R2_ACCESS_KEY_ID: qatthminio
      R2_SECRET_ACCESS_KEY: qatthminiosecret
      R2_BUCKET: qatth-assets
      UPLOAD_DIR: /app/data/uploads
      GENERATED_DIR: /app/data/generated
    command: celery -A app.core.celery_app worker --loglevel=INFO
    volumes:
      - app_data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    init: true
    stop_grace_period: 90s
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://qatth:qatth@postgres:5432/qatth
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A app.core.celery_app beat --loglevel=INFO --schedule=/tmp/celerybeat-schedule
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    init: true
    stop_grace_period: 30s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: qatthminio
      MINIO_ROOT_PASSWORD: qatthminiosecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: >-
      until mc alias set local http://minio:9000 qatthminio qatthminiosecret; do sleep 1; done;
      mc mb --ignore-existing local/qatth-assets
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: qatth
      POSTGRES_USER: qatth
      POSTGRES_PASSWORD: qatth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init_pgvector.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qatth -d qatth"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_data:
  minio_data:
  postgres_data:

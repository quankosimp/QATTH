services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: qatth
      POSTGRES_USER: qatth
      POSTGRES_PASSWORD: qatth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init_pgvector.sql:ro

volumes:
  postgres_data:

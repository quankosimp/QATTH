components:
  securitySchemes:
    bearerAuth:
      type: oauth2
      description: OIDC access token. Scopes are enforced for privileged operations.
      flows:
        authorizationCode:
          authorizationUrl: https://identity.example.com/oauth2/authorize
          tokenUrl: https://identity.example.com/oauth2/token
          scopes:
            admin:model:read: Read AI configuration.
            admin:model:write: Write AI configuration.
            admin:jobs:read: Read job source operations.
            admin:billing:read: Read billing catalog and operations.
            admin:billing:write: Adjust credits.
            ops:jobs:read: Read background jobs.
            ops:jobs:write: Retry background jobs.
    webhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
      description: Provider-specific signature validated against the raw request body.

  parameters:
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    FileId:
      name: file_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScanId:
      name: scan_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CvId:
      name: cv_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CvVersionId:
      name: version_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CvAnalysisId:
      name: analysis_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InterviewId:
      name: interview_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApplicationId:
      name: application_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  headers:
    RequestId:
      description: Correlation identifier for support and tracing.
      schema:
        type: string

  responses:
    Error:
      description: Standard error response.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    Meta:
      type: object
      properties:
        request_id:
          type: string
        next_cursor:
          type: [string, 'null']
        has_more:
          type: boolean
      additionalProperties: true

    SuccessEnvelope:
      type: object
      required: [data]
      properties:
        data: {}
        meta:
          $ref: '#/components/schemas/Meta'

    ErrorEnvelope:
      type: object
      required: [error, meta]
      properties:
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ApiError'
        meta:
          $ref: '#/components/schemas/Meta'

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          pattern: '^[A-Z0-9_]+$'
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        retryable:
          type: boolean

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable]
        version:
          type: string
        checks:
          type: object
          additionalProperties:
            type: string

    User:
      type: object
      required: [id, status, locale, created_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, locked, pending_deletion]
        email:
          type: [string, 'null']
          format: email
        display_name:
          type: [string, 'null']
        locale:
          type: string
        timezone:
          type: string
        profile:
          $ref: '#/components/schemas/CareerProfile'
        job_preferences:
          $ref: '#/components/schemas/JobPreferences'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CareerProfile:
      type: object
      properties:
        headline:
          type: [string, 'null']
          maxLength: 200
        location:
          type: [string, 'null']
        seniority:
          type: [string, 'null']
        skills:
          type: array
          items:
            type: string
        links:
          type: array
          items:
            type: string
            format: uri

    JobPreferences:
      type: object
      properties:
        target_roles:
          type: array
          items:
            type: string
        locations:
          type: array
          items:
            type: string
        remote_modes:
          type: array
          items:
            $ref: '#/components/schemas/RemoteMode'
        employment_types:
          type: array
          items:
            type: string
        minimum_salary:
          type: [integer, 'null']
          minimum: 0
        salary_currency:
          type: [string, 'null']
          pattern: '^[A-Z]{3}$'
        preferred_skills:
          type: array
          items:
            type: string

    ProfilePatch:
      type: object
      properties:
        display_name:
          type: [string, 'null']
          maxLength: 120
        locale:
          type: string
        timezone:
          type: string
        profile:
          $ref: '#/components/schemas/CareerProfile'
        job_preferences:
          $ref: '#/components/schemas/JobPreferences'
      additionalProperties: false


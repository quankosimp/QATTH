components:
  securitySchemes:
    bearerAuth:
      type: oauth2
      description: OIDC access token. Scopes are enforced for privileged operations.
      flows:
        authorizationCode:
          authorizationUrl: https://identity.example.com/oauth2/authorize
          tokenUrl: https://identity.example.com/oauth2/token
          scopes:
            admin:model:read: Read AI configuration.
            admin:model:write: Write AI configuration.
            admin:jobs:read: Read job source operations.
            admin:billing:read: Read billing catalog and operations.
            admin:billing:write: Adjust credits.
            ops:jobs:read: Read background jobs.
            ops:jobs:write: Retry background jobs.
    webhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
      description: Provider-specific signature validated against the raw request body.
    HTTPBearer:
      type: http
      scheme: bearer
  parameters:
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    FileId:
      name: file_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScanId:
      name: scan_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CvId:
      name: cv_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CvVersionId:
      name: version_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CvAnalysisId:
      name: analysis_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InterviewId:
      name: interview_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApplicationId:
      name: application_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  headers:
    RequestId:
      description: Correlation identifier for support and tracing.
      schema:
        type: string
  responses:
    Error:
      description: Standard error response.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    Meta:
      properties:
        request_id:
          type: string
          title: Request Id
        version:
          type: string
          title: Version
          default: v1
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
        has_more:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Has More
      type: object
      required:
      - request_id
      title: Meta
    SuccessEnvelope:
      type: object
      required:
      - data
      properties:
        data: {}
        meta:
          $ref: '#/components/schemas/Meta'
    ErrorEnvelope:
      type: object
      required:
      - error
      - meta
      properties:
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ApiError'
        meta:
          $ref: '#/components/schemas/Meta'
    ApiError:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          pattern: ^[A-Z0-9_]+$
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        retryable:
          type: boolean
    HealthResponse:
      properties:
        status:
          type: string
          enum:
          - ok
          - degraded
          - unavailable
          title: Status
        version:
          type: string
          title: Version
        checks:

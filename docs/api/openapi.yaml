        locale_hint:
          type: [string, 'null']
      additionalProperties: false

    AsyncState:
      type: string
      enum: [queued, processing, completed, failed, cancelled]

    CvScan:
      type: object
      required: [id, file_id, status, schema_version, created_at]
      properties:
        id:

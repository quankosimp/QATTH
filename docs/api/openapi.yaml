openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: QATTH Product API
  version: 1.0.0-draft
  summary: Product v1 contract for AI-assisted career preparation and job discovery.
  description: 'Target contract for the production QATTH product. This contract intentionally

    extends beyond the current demo backend. Each operation declares

    x-implementation-status as implemented, partial, or planned.

    '
  x-contract-status: draft
  x-document-language: vi-VN
  x-contract-source: FastAPI runtime schema plus product requirement metadata
servers:
- url: http://localhost:8000
  description: Local backend
- url: https://api.qatthcv.com
  description: Production target
security:
- bearerAuth: []
tags:
- name: Health
- name: Identity
- name: Files
- name: CV
- name: Interviews
- name: Jobs
- name: Recommendations
- name: Billing
- name: Privacy
- name: Admin
- name: Operations
paths:
  /health/live:
    get:
      tags:
      - Health
      summary: Process liveness
      operationId: getLiveness
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          $ref: '#/components/responses/Error'
      security: []
      x-requirement-ids:
      - FR-OPS-001
      - NFR-AVL-002
      x-implementation-status: implemented
  /health/ready:
    get:
      tags:
      - Health
      summary: Instance readiness
      operationId: getReadiness
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
      security: []
      x-requirement-ids:
      - FR-OPS-001
      - NFR-AVL-002
      x-implementation-status: implemented

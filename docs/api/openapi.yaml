          type: [string, 'null']
      additionalProperties: false

    FileAsset:
      type: object
      required: [id, purpose, content_type, size_bytes, upload_status, security_status, created_at]
      properties:
        id:
          type: string
          format: uuid
        purpose:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
        sha256:
          type: string
        upload_status:
          type: string
          enum: [pending, uploaded, rejected, deleted]
        security_status:
          type: string
          enum: [pending, clean, quarantined, failed]
        created_at:
          type: string
          format: date-time


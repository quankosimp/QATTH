          const: PUT
        upload_url:
          type: string
          format: uri
        required_headers:
          type: object
          additionalProperties:
            type: string
        expires_at:
          type: string
          format: date-time

    CompleteUploadRequest:
      type: object
      required: [sha256]
      properties:

      operationId: connectInterviewRealtime
      x-implementation-status: partial
      x-requirement-ids:
      - FR-INT-003
      - FR-INT-004
      - FR-INT-005
      x-websocket-events:
        client:
        - session.start
        - audio.append
        - audio.commit
        - session.end
        - ping
        server:
        - session.ready
        - transcript.delta
        - transcript.final
        - audio.delta
        - warning
        - session.ended
        - error
      responses:
        '101':
          description: Switching Protocols.
        default:
          $ref: '#/components/responses/Error'

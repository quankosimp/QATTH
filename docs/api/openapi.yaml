openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: QATTH Product API
  version: 1.0.0-draft
  summary: Product v1 contract for AI-assisted career preparation and job discovery.
  description: |
    Target contract for the production QATTH product. This contract intentionally
    extends beyond the current demo backend. Each operation declares
    x-implementation-status as implemented-demo, partial, or planned.
  x-contract-status: draft
  x-document-language: vi-VN
servers:
  - url: http://localhost:8000
    description: Local backend
  - url: https://api.qatthcv.com
    description: Production target
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Identity
  - name: Files
  - name: CV
  - name: Interviews
  - name: Jobs
  - name: Recommendations
  - name: Billing
  - name: Privacy
  - name: Admin
  - name: Operations

paths:
  /health/live:
    get:
      tags: [Health]
      summary: Process liveness
      operationId: getLiveness
      security: []
      x-implementation-status: partial
      x-requirement-ids: [FR-OPS-001, NFR-AVL-002]
      responses:
        '200':
          description: Process is alive.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          $ref: '#/components/responses/Error'

  /health/ready:
    get:
      tags: [Health]
      summary: Instance readiness
      operationId: getReadiness
      security: []
      x-implementation-status: partial
      x-requirement-ids: [FR-OPS-001, NFR-AVL-002]
      responses:
        '200':
          description: Instance can receive traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          $ref: '#/components/responses/Error'

  /v1/me:
    get:
      tags: [Identity]
      summary: Get the authenticated user
      operationId: getCurrentUser
      x-implementation-status: partial
      x-requirement-ids: [FR-AUTH-001, FR-AUTH-002, FR-PROFILE-001]
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/Error'

  /v1/me/profile:
    patch:
      tags: [Identity]
      summary: Update the career profile
      operationId: updateCurrentUserProfile
      x-implementation-status: partial
      x-requirement-ids: [FR-PROFILE-001, FR-PROFILE-002]
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/ProfilePatch'
      responses:
        '200':
          description: Updated user profile.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        default:
          $ref: '#/components/responses/Error'

  /v1/me/consents:
    get:
      tags: [Identity]
      summary: List current consent records
      operationId: listCurrentUserConsents
      x-implementation-status: partial
      x-requirement-ids: [FR-PROFILE-003, FR-PRIV-003]
      responses:
        '200':
          description: Consent records.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Consent'
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [Identity]
      summary: Grant or withdraw consent
      operationId: setCurrentUserConsent
      x-implementation-status: partial
      x-requirement-ids: [FR-PROFILE-003, FR-PRIV-003]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentChange'
      responses:
        '200':
          description: Recorded consent state.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Consent'
        default:
          $ref: '#/components/responses/Error'

  /v1/files/upload-intents:
    post:
      tags: [Files]
      summary: Create a direct upload intent
      operationId: createUploadIntent
      x-implementation-status: planned
      x-requirement-ids: [FR-FILE-001, FR-FILE-002]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUploadIntentRequest'
      responses:
        '201':
          description: Upload intent and signed URL.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UploadIntent'
        default:
          $ref: '#/components/responses/Error'

  /v1/files/{file_id}/complete:
    parameters:
      - $ref: '#/components/parameters/FileId'
    post:
      tags: [Files]
      summary: Complete and verify an upload
      operationId: completeFileUpload
      x-implementation-status: planned
      x-requirement-ids: [FR-FILE-001, FR-FILE-002]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteUploadRequest'
      responses:
        '200':
          description: Verified file metadata.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FileAsset'
        default:
          $ref: '#/components/responses/Error'

  /v1/files/{file_id}/download-url:
    parameters:
      - $ref: '#/components/parameters/FileId'
    post:
      tags: [Files]
      summary: Create a short-lived download URL
      operationId: createFileDownloadUrl
      x-implementation-status: planned
      x-requirement-ids: [FR-FILE-003]
      responses:
        '200':
          description: Signed download URL.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SignedUrl'
        default:
          $ref: '#/components/responses/Error'

  /v1/cv-scans:
    post:
      tags: [CV]
      summary: Start structured CV extraction
      operationId: createCvScan
      x-implementation-status: partial
      x-requirement-ids: [FR-CV-001, FR-CV-002, FR-CV-003]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCvScanRequest'
      responses:
        '202':
          description: CV scan accepted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CvScan'
        default:
          $ref: '#/components/responses/Error'

  /v1/cv-scans/{scan_id}:
    parameters:
      - $ref: '#/components/parameters/ScanId'
    get:
      tags: [CV]
      summary: Get CV scan status
      operationId: getCvScan
      x-implementation-status: partial
      x-requirement-ids: [FR-CV-001, FR-CV-008]
      responses:
        '200':
          description: Scan state.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CvScan'
        default:
          $ref: '#/components/responses/Error'

  /v1/cv-scans/{scan_id}/draft:
    parameters:
      - $ref: '#/components/parameters/ScanId'
    get:
      tags: [CV]
      summary: Get editable CV draft
      operationId: getCvDraft
      x-implementation-status: implemented-demo
      x-requirement-ids: [FR-CV-003]
      responses:
        '200':
          description: Editable draft.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CvDraft'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [CV]
      summary: Edit CV draft
      operationId: updateCvDraft
      x-implementation-status: implemented-demo
      x-requirement-ids: [FR-CV-003]
      parameters:
        - name: If-Match
          in: header
          required: true
          description: Current draft revision or ETag.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/CvDraftPatch'
      responses:
        '200':
          description: Updated draft.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CvDraft'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /v1/cv-scans/{scan_id}/confirm:
    parameters:
      - $ref: '#/components/parameters/ScanId'
    post:
      tags: [CV]
      summary: Confirm draft and create immutable CV version
      operationId: confirmCvDraft
      x-implementation-status: implemented-demo
      x-requirement-ids: [FR-CV-004, FR-CV-005]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmCvDraftRequest'
      responses:
        '201':
          description: Confirmed CV version.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CvVersion'
        default:
          $ref: '#/components/responses/Error'

  /v1/cvs:
    get:
      tags: [CV]
      summary: List the current user's CVs
      operationId: listCvs
      x-implementation-status: partial
      x-requirement-ids: [FR-CV-005, FR-CV-009]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated CVs.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CvPage'
        default:
          $ref: '#/components/responses/Error'

  /v1/cvs/{cv_id}/versions:
    parameters:
      - $ref: '#/components/parameters/CvId'
    get:
      tags: [CV]
      summary: List immutable CV versions
      operationId: listCvVersions
      x-implementation-status: partial
      x-requirement-ids: [FR-CV-005, FR-CV-006]
      responses:
        '200':
          description: CV versions.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CvVersion'
        default:
          $ref: '#/components/responses/Error'

  /v1/cvs/{cv_id}/active-version:
    parameters:
      - $ref: '#/components/parameters/CvId'
    put:
      tags: [CV]
      summary: Select the active CV version
      operationId: setActiveCvVersion
      x-implementation-status: partial
      x-requirement-ids: [FR-CV-005]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version_id]
              properties:
                version_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Active version selected.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CvVersion'
        default:
          $ref: '#/components/responses/Error'

  /v1/cv-versions/{version_id}/analyses:
    parameters:
      - $ref: '#/components/parameters/CvVersionId'
    post:
      tags: [CV]
      summary: Start CV analysis
      operationId: createCvAnalysis
      x-implementation-status: partial
      x-requirement-ids: [FR-CV-007, FR-BILL-005]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Analysis accepted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CvAnalysis'
        default:
          $ref: '#/components/responses/Error'

  /v1/cv-analyses/{analysis_id}:
    parameters:
      - $ref: '#/components/parameters/CvAnalysisId'
    get:
      tags: [CV]
      summary: Get CV analysis
      operationId: getCvAnalysis
      x-implementation-status: partial
      x-requirement-ids: [FR-CV-007, FR-CV-008]
      responses:
        '200':
          description: Analysis state or result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CvAnalysis'
        default:
          $ref: '#/components/responses/Error'

  /v1/interviews:
    get:
      tags: [Interviews]
      summary: List interview sessions
      operationId: listInterviews
      x-implementation-status: partial
      x-requirement-ids: [FR-INT-001, FR-INT-007]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Interview page.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InterviewPage'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Interviews]
      summary: Create an interview session
      operationId: createInterview
      x-implementation-status: partial
      x-requirement-ids: [FR-INT-001, FR-BILL-005]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInterviewRequest'
      responses:
        '201':
          description: Interview created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Interview'
        default:
          $ref: '#/components/responses/Error'

  /v1/interviews/{interview_id}:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    get:
      tags: [Interviews]
      summary: Get interview state
      operationId: getInterview
      x-implementation-status: partial
      x-requirement-ids: [FR-INT-001, FR-INT-005]
      responses:
        '200':
          description: Interview state.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Interview'
        default:
          $ref: '#/components/responses/Error'

  /v1/interviews/{interview_id}/realtime-token:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    post:
      tags: [Interviews]
      summary: Create a scoped realtime token
      operationId: createInterviewRealtimeToken
      x-implementation-status: planned
      x-requirement-ids: [FR-INT-002, FR-INT-003]
      responses:
        '201':
          description: Short-lived connection token.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RealtimeToken'
        default:
          $ref: '#/components/responses/Error'

  /v1/interviews/{interview_id}/realtime:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    get:
      tags: [Interviews]
      summary: Upgrade to the interview WebSocket
      description: Uses the scoped realtime token during the WebSocket upgrade.
      operationId: connectInterviewRealtime
      x-implementation-status: planned
      x-requirement-ids: [FR-INT-003, FR-INT-004, FR-INT-005]
      x-websocket-events:
        client:
          - session.start
          - audio.append
          - audio.commit
          - session.end
          - ping
        server:
          - session.ready
          - transcript.delta
          - transcript.final
          - audio.delta
          - warning
          - session.ended
          - error
      responses:
        '101':
          description: Switching Protocols.
        default:
          $ref: '#/components/responses/Error'

  /v1/interviews/{interview_id}/end:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    post:
      tags: [Interviews]
      summary: End an interview and queue evaluation
      operationId: endInterview
      x-implementation-status: partial
      x-requirement-ids: [FR-INT-005, FR-INT-006]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Interview ending and evaluation queued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Interview'
        default:
          $ref: '#/components/responses/Error'

  /v1/interviews/{interview_id}/report:
    parameters:
      - $ref: '#/components/parameters/InterviewId'
    get:
      tags: [Interviews]
      summary: Get interview evaluation report
      operationId: getInterviewReport
      x-implementation-status: partial
      x-requirement-ids: [FR-INT-006, FR-INT-007]
      responses:
        '200':
          description: Evaluation report.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InterviewReport'
        '202':
          description: Evaluation is still processing.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Interview'
        default:
          $ref: '#/components/responses/Error'

  /v1/jobs:
    get:
      tags: [Jobs]
      summary: Search the indexed job catalog
      operationId: searchIndexedJobs
      x-implementation-status: partial
      x-requirement-ids: [FR-JOB-005, FR-JOB-006, FR-JOB-011]
      parameters:
        - name: q
          in: query
          schema:
            type: string
            maxLength: 500
        - name: location
          in: query
          schema:
            type: string
        - name: remote_mode
          in: query
          schema:
            $ref: '#/components/schemas/RemoteMode'
        - name: skills
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Indexed job results.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/JobPage'
        default:
          $ref: '#/components/responses/Error'

  /v1/jobs/{job_id}:
    parameters:
      - $ref: '#/components/parameters/JobId'
    get:
      tags: [Jobs]
      summary: Get normalized job details and provenance
      operationId: getJob
      x-implementation-status: partial
      x-requirement-ids: [FR-JOB-003, FR-JOB-004, FR-JOB-005]
      responses:
        '200':
          description: Job details.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Job'
        default:
          $ref: '#/components/responses/Error'

  /v1/job-search-runs:
    post:
      tags: [Jobs]
      summary: Start a hybrid indexed and live web search
      operationId: createJobSearchRun
      x-implementation-status: partial
      x-requirement-ids: [FR-JOB-002, FR-JOB-006, FR-JOB-007, FR-JOB-009]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobSearchRequest'
      responses:
        '202':
          description: Search accepted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/JobSearchRun'
        default:
          $ref: '#/components/responses/Error'

  /v1/job-search-runs/{run_id}:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Jobs]
      summary: Get job search status
      operationId: getJobSearchRun
      x-implementation-status: partial
      x-requirement-ids: [FR-JOB-002, FR-JOB-009]
      responses:
        '200':
          description: Search run state.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/JobSearchRun'
        default:
          $ref: '#/components/responses/Error'

  /v1/job-search-runs/{run_id}/events:
    parameters:
      - $ref: '#/components/parameters/RunId'
      - name: Last-Event-ID
        in: header
        required: false
        schema:
          type: string
    get:
      tags: [Jobs]
      summary: Stream job search progress using SSE
      operationId: streamJobSearchEvents
      x-implementation-status: planned
      x-requirement-ids: [FR-JOB-009]
      x-sse-events:
        - run.started
        - source.progress
        - job.discovered
        - job.verified
        - results.updated
        - run.completed
        - run.failed
      responses:
        '200':
          description: Server-sent event stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE frames with id, event, and JSON data fields.
        default:
          $ref: '#/components/responses/Error'

  /v1/job-search-runs/{run_id}/results:
    parameters:
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Jobs]
      summary: Get a snapshot of ranked search results
      operationId: listJobSearchResults
      x-implementation-status: partial
      x-requirement-ids: [FR-JOB-007, FR-JOB-008, FR-JOB-009]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Ranked search result page.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:

      type: object
      required: [id, purpose, policy_version, status, updated_at]
      properties:
        id:
          type: string
          format: uuid
        purpose:
          type: string
          enum: [product_processing, marketing, model_training]
        policy_version:
          type: string
        status:
          type: string
          enum: [granted, withdrawn]
        granted_at:
          type: [string, 'null']
          format: date-time
        withdrawn_at:
          type: [string, 'null']
          format: date-time
        updated_at:
          type: string
          format: date-time

    ConsentChange:
      type: object
